<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart To-Do Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body class="bg-light">

  <div class="container py-4">

    <h1 class="text-center mb-4">Smart To-Do Manager</h1>

    <div class="card p-3 mb-4">
      <div class="row g-2">
        <div class="col-md-4">
          <input type="text" id="taskInput" class="form-control" placeholder="Task name..." />
        </div>
        <div class="col-md-3">
          <select id="priorityInput" class="form-select">
            <option value="Low">Low</option>
            <option value="Medium" selected>Medium</option>
            <option value="High">High</option>
          </select>
        </div>
        <div class="col-md-3">
          <input type="date" id="deadlineInput" class="form-control" />
        </div>
        <div class="col-md-2">
          <button onclick="addTask()" class="btn btn-primary w-100">Add Task</button>
        </div>
      </div>
    </div>


    <div class="d-flex flex-wrap gap-2 mb-3 align-items-center">
      <button class="btn btn-outline-secondary btn-sm" onclick="setFilter('all')">All Tasks</button>
      <button class="btn btn-outline-success btn-sm" onclick="setFilter('completed')">Completed</button>
      <button class="btn btn-outline-warning btn-sm" onclick="setFilter('pending')">Pending</button>

      <select id="sortSelect" class="form-select form-select-sm w-auto ms-auto" onchange="debouncedRender()">
        <option value="none">-- Sort --</option>
        <option value="priority">Sort by Priority (High → Low)</option>
        <option value="deadline">Sort by Deadline (Nearest First)</option>
      </select>
    </div>

    <div class="row text-center mb-3">
      <div class="col">
        <span class="badge bg-secondary fs-6">Total: <span id="totalCount">0</span></span>
      </div>
      <div class="col">
        <span class="badge bg-success fs-6">Completed: <span id="completedCount">0</span></span>
      </div>
      <div class="col">
        <span class="badge bg-warning text-dark fs-6">Pending: <span id="pendingCount">0</span></span>
      </div>
    </div>

    <div id="taskList"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
